site_name: Procela
site_description: Epistemic Governance in Mechanistic Simulations Under Structural Uncertainty
site_url: https://docs.procela.org
repo_url: https://github.com/kvernet/procela
repo_name: kvernet/procela
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
    - scheme: slate
      primary: blue
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [procela]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            heading_level: 2
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
  #- autorefs
  - mkdocs-jupyter:
      include_source: True
      ignore_h1_titles: True
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - codehilite:
      guess_lang: false
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - First Simulation: getting-started/first-simulation.md
  - Core Concepts:
      - Variables: core/variables.md
      - Mechanisms: core/mechanisms.md
      - Governance: core/governance.md
      - Epistemic Signals: core/epistemic-signals.md
      - Executive: core/executive.md
  - Advanced:
      - Custom Policies: advanced/custom-policies.md
      - Audit Trail: advanced/audit-trail.md
      - Performance: advanced/performance.md
  - Examples:
      - Home: examples/index.md
      - Beginner:
        - Simple Growth: examples/beginner/simple-growth.md
        - Basic Governance: examples/beginner/basic-governance.md
        - Multiple Variables: examples/beginner/multiple-variables.md
      - Intermediate:
        - Fragility Detection and Response: examples/intermediate/fragility-detection.md
        - Coverage-Based Mechanism Selection: examples/intermediate/coverage-selection.md
        - Multi-Variable Governance: examples/intermediate/multi-variable.md
        - Custom Epistemic Signals: examples/intermediate/custom-signals.md
        - Checkpoint and Restore: examples/intermediate/checkpoint-restore.md
      - Advanced:
        - AMR Case Study: examples/advanced/amr-case-study.md
        - Ensemble Mechanisms: examples/advanced/ensemble-mechanisms.md
        - Structural Probing: examples/advanced/structural-probing.md
        - Performance Optimization: examples/advanced/performance.md
        - Custom Resolution Policies: examples/advanced/custom-policies.md
        - Distributed Simulation: examples/advanced/distributed.md
        - Reinforcement Learning Integration: examples/advanced/rl-integration.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Semantics:
      - Key: semantics/symbols/key.md
      - KeyAuthority: semantics/core/key-authority.md
      - Time: semantics/symbols/time.md
      - Domain:
        - Range: semantics/core/variable/domain/range.md
        - Boolean: semantics/core/variable/domain/boolean.md
        - Categorical: semantics/core/variable/domain/categorical.md
        - Composite: semantics/core/variable/domain/composite.md
        - Abstract class: semantics/core/variable/domain/value.md
      - Memory:
        - VariableRecord: semantics/core/memory/variable/record.md
        - VariableMemory: semantics/core/memory/variable/memory.md
